<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Suggestions</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: transparent;
      }
      #panel {
        height: 100%;
        padding: 6px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--bg);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      }
      .row {
        display: flex;
        align-items: center;
        gap: 8px;
        height: 34px;
        padding: 0 10px;
        border-radius: 7px;
        cursor: pointer;
        white-space: nowrap;
        overflow: hidden;
      }
      .row.sel,
      .row:hover {
        background: var(--hover);
      }
      .row .icon {
        flex: 0 0 16px;
        font-size: 12px;
        opacity: 0.75;
        text-align: center;
      }
      .row .title {
        flex: 0 1 auto;
        overflow: hidden;
        text-overflow: ellipsis;
        color: var(--text);
        font-size: 13px;
      }
      .row .url {
        flex: 0 1 auto;
        overflow: hidden;
        text-overflow: ellipsis;
        color: var(--muted);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div id="panel"></div>
    <script type="module" src="./suggestions-page.ts"></script>
  </body>
</html>
